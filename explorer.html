<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <title>ENSANUT 2018 — Explorador</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar__logo"><img src="assets/img/Logo.png" alt="Logo" /></div>
      <nav class="sidebar__nav" id="sidebar-nav">
        <div class="sidebar__loading">Cargando tablas...</div>

          <div id="dict-search"></div>

      <main class="content">

      </main>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
